name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax:
    name: Syntax check (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile all .py files
        run: |
          python -m compileall -q -f invokerl/ examples/

      # TODO: once tests exist, add a job that installs dev deps and runs pytest.
      # The training-path dependencies (torch+vllm with CUDA) can't run on
      # GitHub free runners — use a self-hosted GPU runner or a CPU test subset.
