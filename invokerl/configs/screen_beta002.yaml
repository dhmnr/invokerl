# Screening: beta=0.02 (lower KL penalty, more exploration)
model:
  name_or_path: Qwen/Qwen3-0.6B
  dtype: bfloat16

algorithm:
  name: grpo
  clip_eps: 0.2
  beta: 0.02

training:
  total_steps: 50
  lr: 5.0e-6
  weight_decay: 0.01
  grad_clip: 1.0
  warmup_steps: 10
  accumulation_steps: 4
  batch_size: 1
  group_size: 4

generation:
  max_new_tokens: 512
  max_model_len: 2048
  temperature: 0.9
  top_k: 50
  gpu_memory_utilization: 0.3

reward:
  type: rule
  dataset: gsm8k

logging:
  log_every: 10
  eval_every: 50
  save_every: 50
  output_dir: ./checkpoints/screen_beta002
