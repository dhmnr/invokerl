# GRPO sweep: fp32 master weights + LR=1e-6 (isolates precision hypothesis)
# If this matches/beats bf16+lr5e6 (55.5%), confirms bf16 was the bottleneck.
model:
  name_or_path: Qwen/Qwen3-0.6B
  dtype: bfloat16
  master_weights_fp32: true

algorithm:
  name: grpo
  clip_eps: 0.2
  beta: 0.04

training:
  total_steps: 200
  lr: 1.0e-6
  weight_decay: 0.01
  grad_clip: 1.0
  warmup_steps: 50
  accumulation_steps: 4
  batch_size: 1
  group_size: 4

generation:
  max_new_tokens: 512
  max_model_len: 2048
  temperature: 0.9
  top_k: 50
  gpu_memory_utilization: 0.25  # reduced for fp32 master weights memory

reward:
  type: rule
  dataset: gsm8k

logging:
  log_every: 10
  eval_every: 50
  save_every: 100
  output_dir: ./checkpoints/sweep_fp32_lr1e6
